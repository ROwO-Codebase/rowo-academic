name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check Cloudflare generated types
        run: npm run cf:types:check

      - name: Lint
        run: npm run lint

      # The repository test script performs the production vinext build first.
      - name: Build and test
        run: npm test

      # Deployment intentionally lives in Cloudflare Workers Builds. Do not add
      # Wrangler deployment credentials or a second CD path to this workflow.
